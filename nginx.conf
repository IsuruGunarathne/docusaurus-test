server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use /tmp for all writable paths (read-only root filesystem)
    client_temp_path /tmp/client_temp;
    proxy_temp_path  /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path  /tmp/uwsgi_temp;
    scgi_temp_path   /tmp/scgi_temp;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Immutable static assets (hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — never cache (always latest)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — required for Docusaurus client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
